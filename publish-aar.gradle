// GitHub Packages（可选）：有 githubUsername+githubToken 才挂；公开包也需 read:packages 的 classic PAT 鉴权，无凭据则不挂以免 401 中断解析。包坐标同 Maven Central，仓库地址 OWNER 须小写。
// 如要强制走 mavenCentral 包，临时注释掉下面行再构建即可（常态保留便于本地联调，不影响已发布的远程包解析）。
