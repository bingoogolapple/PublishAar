// SNAPSHOT 仓库（Maven Central 快照落点，与正式仓库 repo1.maven.org 不同）：
// 仅当 VERSION_NAME 以 -SNAPSHOT 结尾、且命名空间已开启 Enable SNAPSHOTs 时才有内容。
// 常态保留便于拉取快照包；若只想走正式版，临时注释掉本段即可。
// maven { url = uri("https://central.sonatype.com/repository/maven-snapshots/") }